name: Close Released Issues

# IMPORTANTE: o trigger 'release' precisa de evento criado por um PAT.
# `gh release create` no Release workflow usa GITHUB_TOKEN, e o GitHub
# bloqueia eventos do GITHUB_TOKEN de disparar outros workflows (anti-loop).
# Usamos `workflow_run` pra escutar o término do Release — esse trigger
# funciona independente do token que criou a release.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  issues: write
  contents: read

jobs:
  close:
    # Só roda se o Release terminou com sucesso (sem isso fecharia issues
    # mesmo quando o build falhou).
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # Self-hosted Mac runner — quota Ubuntu hosted esgotou (issue #73)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // workflow_run não carrega payload da release; head_branch do
            // Release é a tag (release.yml dispara via `gh workflow run --ref vX.Y.Z`).
            const version = context.payload.workflow_run.head_branch
            if (!version || !/^v\d+\.\d+\.\d+/.test(version)) {
              core.warning(`head_branch '${version}' nao parece tag de release — abortando.`)
              return
            }

            // Confirma que a release existe (publicada).
            let release
            try {
              const r = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: version,
              })
              release = r.data
            } catch (e) {
              core.warning(`Release ${version} nao encontrada via API: ${e.message}`)
              return
            }
            const url = release.html_url

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'status:in-dev',
              state: 'open',
              per_page: 100,
            })

            if (issues.length === 0) {
              core.info('Nenhuma issue com status:in-dev aguardando release.')
              return
            }

            for (const issue of issues) {
              if (issue.pull_request) continue  // skip PRs (listForRepo retorna ambos)
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Publicado em [${version}](${url}).`,
                })
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                })
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: 'status:in-dev',
                  })
                } catch (e) { /* ignore */ }
                core.info(`Fechada #${issue.number} (publicada em ${version})`)
              } catch (e) {
                core.warning(`Falha em #${issue.number}: ${e.message}`)
              }
            }
