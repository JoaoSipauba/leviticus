name: Close Released Issues

on:
  release:
    types: [published]

permissions:
  issues: write

jobs:
  close:
    # Self-hosted Mac runner — quota Ubuntu hosted esgotou (issue #73)
    runs-on: [self-hosted, macOS, ARM64, leviticus]
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const release = context.payload.release
            const version = release.tag_name
            const url = release.html_url

            // Lista issues com label status:in-dev (todas as que aguardavam release)
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'status:in-dev',
              state: 'open',
              per_page: 100,
            })

            if (issues.length === 0) {
              core.info('Nenhuma issue com status:in-dev aguardando release.')
              return
            }

            for (const issue of issues) {
              if (issue.pull_request) continue  // skip PRs (listForRepo retorna ambos)
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `Publicado em [${version}](${url}).`,
                })
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                  state_reason: 'completed',
                })
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    name: 'status:in-dev',
                  })
                } catch (e) { /* ignore */ }
                core.info(`Fechada #${issue.number} (publicada em ${version})`)
              } catch (e) {
                core.warning(`Falha em #${issue.number}: ${e.message}`)
              }
            }
