name: Issue Status

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, closed]

permissions:
  issues: write
  pull-requests: read

jobs:
  update-status:
    if: github.event.pull_request.base.ref == 'dev' || github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            const body = pr.body || ''
            const baseRef = pr.base.ref
            const merged = pr.merged === true

            // Extrai "Closes #N", "Fixes #N", "Resolves #N" (case-insensitive)
            const re = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi
            const matches = [...body.matchAll(re)]
            const issues = [...new Set(matches.map(m => parseInt(m[1], 10)))]

            if (issues.length === 0) {
              core.info('Sem referências Closes/Fixes/Resolves no body — nada a fazer.')
              return
            }

            let newLabel = null
            let comment = null

            if (pr.state === 'open') {
              newLabel = 'status:in-review'
            } else if (merged && baseRef === 'dev') {
              newLabel = 'status:in-dev'
              comment = `Mergeada em \`dev\` via #${pr.number}. Vai pra produção no próximo release.`
            } else if (merged && baseRef === 'main') {
              core.info('PR mergeada em main — release workflow cuidará do close.')
              return
            } else if (!merged && pr.state === 'closed') {
              for (const num of issues) {
                for (const lbl of ['status:in-review', 'status:in-dev']) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: num,
                      name: lbl,
                    })
                  } catch (e) { /* ignore */ }
                }
              }
              return
            }

            if (!newLabel) return

            const labelsToRemove = ['status:in-review', 'status:in-dev'].filter(l => l !== newLabel)

            for (const num of issues) {
              try {
                for (const lbl of labelsToRemove) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: num,
                      name: lbl,
                    })
                  } catch (e) { /* label não estava presente */ }
                }
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  labels: [newLabel],
                })
                if (comment) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    body: comment,
                  })
                }
                core.info(`Issue #${num} → ${newLabel}`)
              } catch (e) {
                core.warning(`Falha em #${num}: ${e.message}`)
              }
            }
