name: CI

# O CI roda em todo PR (base `dev` ou `main`) e em push direto na `main`.
# NÃO roda em push pra `dev`: quando `dev` tem um PR aberto pra `main`, um
# commit em `dev` dispararia o workflow DUAS vezes — evento `push` (branch
# dev) + evento `pull_request` (sincronização do PR dev→main), pro mesmo
# commit. Com os triggers abaixo, cada commit roda o CI uma vez só, e todo
# PR (feature→dev e dev→main) continua coberto pelo check `CI passed`.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev]

# Cancela runs antigos do MESMO PR quando você dá push novo (economiza
# minutos de CI). Em push direto na main NÃO cancela — não queremos
# abortar uma validação em curso pra main por causa de outro merge.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Typecheck + tests
    runs-on: [self-hosted, macOS, ARM64, leviticus]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @leviticus/core build

      - name: Typecheck (todos os pacotes)
        run: pnpm typecheck

      - name: Tests (todos os pacotes)
        # Vars do Supabase local (mesmas do .env.devlocal comitado) — necessárias
        # porque src/env.ts faz requireEnv() em import-time e o runner não tem
        # .env.local (gitignored). Valores são públicos do supabase-cli local.
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
        run: pnpm test

  # E2E removido do CI: a suíte WebdriverIO + tauri-driver no runner Windows
  # tem falhas pré-existentes a estabilizar. Rodar manualmente antes de abrir
  # PR pra main — `pnpm test:e2e:local` (ver CLAUDE.md). Retomada: issue de E2E.

  # Agregador: é ESTE job que a branch protection exige como required check.
  # Roda sempre (if: always()) e reflete o resultado do `test`.
  ci_passed:
    name: CI passed
    needs: [test]
    if: always()
    runs-on: [self-hosted, macOS, ARM64, leviticus]
    steps:
      - name: Aggregate upstream results
        env:
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          echo "test: $TEST_RESULT"
          if [ "$TEST_RESULT" != "success" ]; then
            echo "::error::Typecheck + tests não passou ($TEST_RESULT)"
            exit 1
          fi
          echo "CI passed ✅"
