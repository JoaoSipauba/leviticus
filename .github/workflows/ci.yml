name: CI

# Trigger amplo de propósito: o workflow precisa rodar em todo push/PR
# pra que o agregador `CI passed` apareça como check obrigatório na
# branch protection. O filtro fino acontece dentro dos jobs.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Cancela runs antigos do MESMO PR quando você dá push novo (economiza
# minutos de CI). Em push direto na main NÃO cancela — não queremos
# abortar uma validação em curso pra main por causa de outro merge.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          # `desktop` cobre tudo que afeta o app desktop ou os testes E2E.
          # Mudanças isoladas em apps/landing/** caem fora desse filtro.
          filters: |
            desktop:
              - 'apps/desktop/**'
              - 'packages/**'
              - 'worker/**'
              - 'supabase/migrations/**'
              - '.github/workflows/ci.yml'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  test:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @leviticus/core build

      - name: Typecheck (todos os pacotes)
        run: pnpm typecheck

      - name: Tests (todos os pacotes)
        run: pnpm test

  e2e:
    name: E2E (todas as jornadas)
    needs: [test, changes]
    # Roda quando: (a) é PR pra main ou push direto na main, E
    # (b) houve mudança em código do desktop / pacotes / schema / CI.
    # Landing-only PRs pulam a suite — não há valor em re-rodar 20min
    # de build Tauri pra um diff de copy ou CSS de marketing.
    if: |
      (github.ref == 'refs/heads/main' || github.base_ref == 'main') &&
      needs.changes.outputs.desktop == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # sccache wrapper acelera builds Rust em todas as etapas. Mais detalhes
      # no step "Setup sccache".
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      # Incremental compilation atrapalha em CI (gera caches que não vão ser
      # reusados) — desligar reduz tamanho de cache e tempo de I/O.
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        # Wrapper de compilação Rust com cache global compartilhado entre
        # workflows (não só entre runs do mesmo branch como o Swatinem).
        # Faz hit em ~50-60% dos arquivos mesmo em cold rust-cache.
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Cache Rust target dir
        # Cacheia target/ + registry/. Cold: 15-20min build do zero.
        # Warm: 2-3min. `save-if: main` evita que branches descartem o cache
        # útil de main (limite de 10GB por repo).
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          workspaces: apps/desktop/src-tauri
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Cache apt packages (Tauri Linux deps)
        # Sem cache: ~30s rodando apt-get update + install toda vez.
        # Com cache: ~3s. `version: 1` é manual cache-buster — bumpar quando
        # mudar a lista de pacotes.
        uses: awalsh128/cache-apt-pkgs-action@5902b33ae29014e6ca012c5d8025d4346556bd40 # v1.4.3
        with:
          packages: libwebkit2gtk-4.1-dev libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev xvfb
          version: 1

      - name: Install cargo-binstall
        # cargo-binstall baixa binários pré-compilados quando disponíveis,
        # evitando compilar tauri-driver do zero (~90s → ~5s).
        uses: cargo-bins/cargo-binstall@aaa84a43aec4955a42c5ffc65d258961e39f276e # v1.19.1

      - name: Install tauri-driver
        run: cargo binstall -y tauri-driver

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @leviticus/core build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # Pin explícito — `latest` quebrou Docker compose mais de uma vez
          # em 2025. Bumpar deliberadamente após teste local.
          version: 2.98.2

      - name: Start Supabase (apenas serviços que os testes E2E usam)
        # Padrão `supabase start` sobe ~10 containers (storage, edge-runtime,
        # imgproxy, inbucket, studio, etc). Nossos E2E usam só Postgres + Auth.
        # Excluir o resto corta ~60s do startup e libera ~1.5GB de RAM.
        run: supabase start -x studio,inbucket,imgproxy,edge-runtime,storage-api

      - name: Capture Supabase keys
        id: supabase-keys
        run: |
          echo "anon=$(supabase status -o json | jq -r '.ANON_KEY')" >> $GITHUB_OUTPUT
          echo "service_role=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_OUTPUT

      - name: Build app (debug)
        working-directory: apps/desktop
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: ${{ steps.supabase-keys.outputs.anon }}
        run: pnpm tauri build --debug --config src-tauri/tauri.conf.dev.json

      - name: Run E2E tests
        working-directory: apps/desktop/e2e
        env:
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase-keys.outputs.service_role }}
        # --server-args explícito: defaults de xvfb usam screen depth 8,
        # que pode quebrar paths de WebKit GPU no Ubuntu 22.04+.
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" pnpm e2e

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ github.run_id }}
          path: apps/desktop/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 7  # screenshots são pra debug imediato; 90d default é desperdício

  # Agregador: é ESTE job que a branch protection exige como required check.
  # Como ele sempre roda (if: always()) e enxerga o resultado dos demais,
  # ele cobre tanto o caso "tudo verde" quanto "e2e pulado de propósito"
  # sem deixar PRs presos em "Expected — Waiting for status".
  ci_passed:
    name: CI passed
    needs: [test, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate upstream results
        env:
          TEST_RESULT: ${{ needs.test.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          echo "test: $TEST_RESULT"
          echo "e2e:  $E2E_RESULT"
          # test SEMPRE precisa ter passado
          if [ "$TEST_RESULT" != "success" ]; then
            echo "::error::Typecheck + tests não passou ($TEST_RESULT)"
            exit 1
          fi
          # e2e pode ser success (rodou e passou) ou skipped (landing-only).
          # Qualquer outro estado (failure, cancelled) bloqueia.
          if [ "$E2E_RESULT" != "success" ] && [ "$E2E_RESULT" != "skipped" ]; then
            echo "::error::E2E não está num estado aceitável ($E2E_RESULT)"
            exit 1
          fi
          echo "CI passed ✅"
