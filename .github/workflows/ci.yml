name: CI

# Trigger amplo de propósito: o workflow precisa rodar em todo push/PR
# pra que o agregador `CI passed` apareça como check obrigatório na
# branch protection. O filtro fino acontece dentro dos jobs.
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

# Cancela runs antigos do MESMO PR quando você dá push novo (economiza
# minutos de CI). Em push direto na main NÃO cancela — não queremos
# abortar uma validação em curso pra main por causa de outro merge.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect changed paths
    # Self-hosted Mac do dono — repo é privado e Free GitHub tem só 2000min/mês
    # de hosted runners. Migrado pra evitar trava por quota mensal.
    runs-on: [self-hosted, macOS, ARM64, leviticus]
    outputs:
      desktop: ${{ steps.filter.outputs.desktop }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          # `desktop` cobre tudo que afeta o app desktop ou os testes E2E.
          # Mudanças isoladas em apps/landing/** caem fora desse filtro.
          filters: |
            desktop:
              - 'apps/desktop/**'
              - 'packages/**'
              - 'worker/**'
              - 'supabase/migrations/**'
              - '.github/workflows/ci.yml'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'

  test:
    name: Typecheck + tests
    runs-on: [self-hosted, macOS, ARM64, leviticus]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @leviticus/core build

      - name: Typecheck (todos os pacotes)
        run: pnpm typecheck

      - name: Tests (todos os pacotes)
        # Vars do Supabase local (mesmas do .env.devlocal comitado) — necessárias
        # porque src/env.ts faz requireEnv() em import-time e o runner não tem
        # .env.local (gitignored). Valores são públicos do supabase-cli local.
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
        run: pnpm test

  e2e:
    name: E2E (todas as jornadas)
    needs: [test, changes]
    # Roda só em PR/push pra main + se mudou código desktop/pacotes/schema/CI.
    # Issue #73: usa @crabnebula/tauri-driver (fork oficial compat Tauri 2)
    # em vez do tauri-driver crate oficial v0.1.4 (que só funciona com Tauri 1).
    if: |
      (github.ref == 'refs/heads/main' || github.base_ref == 'main') &&
      needs.changes.outputs.desktop == 'true'
    runs-on: [self-hosted, leviticus, Windows, X64]
    timeout-minutes: 45
    # Default shell bash em todos os steps — o Windows runner tem Git Bash
    # via Git for Windows. Comandos consistentes com release.yml.
    defaults:
      run:
        shell: bash
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Cache Rust target dir
        uses: Swatinem/rust-cache@98c8021b550208e191a6a3145459bfc9fb29c4c0 # v2.8.0
        with:
          workspaces: apps/desktop/src-tauri
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install JS dependencies
        # @crabnebula/tauri-driver vem como devDependency em apps/desktop/e2e
        # após esse install. Não precisa mais cargo install/binstall.
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm --filter @leviticus/core build

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - name: Start Supabase (apenas serviços que os testes E2E usam)
        # Docker Desktop precisa estar rodando no runner (one-time setup).
        # Excluir storage/studio/inbucket/imgproxy/edge-runtime corta ~60s.
        run: supabase start -x studio,inbucket,imgproxy,edge-runtime,storage-api

      - name: Capture Supabase keys
        id: supabase-keys
        run: |
          echo "anon=$(supabase status -o json | jq -r '.ANON_KEY')" >> $GITHUB_OUTPUT
          echo "service_role=$(supabase status -o json | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_OUTPUT

      - name: Setup MSVC environment
        # Importa PATH/INCLUDE/LIB do MSVC build tools (vcvarsall.bat).
        uses: ilammy/msvc-dev-cmd@v1

      - name: Resolve MSVC linker absolute path
        # Mesmo com msvc-dev-cmd, o Git\usr\bin\link.exe (GNU) persiste no
        # PATH antes do link.exe do MSVC. Força o linker via env var do Cargo
        # que aceita caminho absoluto, contornando ambiguidade de PATH.
        shell: powershell
        run: |
          $msvc = "C:\Program Files (x86)\Microsoft Visual Studio\2022\BuildTools\VC\Tools\MSVC"
          $ver = (Get-ChildItem $msvc -Directory | Sort-Object Name -Descending | Select-Object -First 1).Name
          $linkPath = "$msvc\$ver\bin\Hostx64\x64\link.exe"
          if (-not (Test-Path $linkPath)) { throw "link.exe não encontrado em $linkPath" }
          "CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER=$linkPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding ASCII
          Write-Host "Linker setado: $linkPath"

      - name: Build app (debug)
        working-directory: apps/desktop
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: ${{ steps.supabase-keys.outputs.anon }}
        # --no-bundle: E2E só precisa do .exe; pular bundling do WixTools
        # (Windows) que requer candle.exe que não vem no Build Tools básico.
        run: pnpm tauri build --debug --no-bundle --config src-tauri/tauri.conf.dev.json

      - name: Setup msedgedriver
        # tauri-driver (@crabnebula) precisa do msedgedriver.exe no PATH pra
        # dirigir o WebView2 — sem ele sai com CannotFindBinaryPath e nenhuma
        # spec roda. Baixa a versão exata do Edge instalado (Edge auto-atualiza,
        # então fixar versão quebraria; resolver em runtime é o robusto).
        shell: powershell
        run: |
          $appDir = 'C:\Program Files (x86)\Microsoft\Edge\Application'
          $ver = (Get-ChildItem $appDir -Directory |
            Where-Object { $_.Name -match '^\d+\.\d+\.\d+\.\d+$' } |
            Sort-Object { [version]$_.Name } -Descending |
            Select-Object -First 1).Name
          if (-not $ver) { throw "Versao do Edge nao encontrada em $appDir" }
          Write-Host "Edge instalado: $ver"
          $dest = Join-Path $env:RUNNER_TEMP 'edgedriver'
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          $zip = Join-Path $dest 'edgedriver.zip'
          Invoke-WebRequest -Uri "https://msedgedriver.microsoft.com/$ver/edgedriver_win64.zip" -OutFile $zip
          Expand-Archive -Force -Path $zip -DestinationPath $dest
          & "$dest\msedgedriver.exe" --version
          Add-Content -Path $env:GITHUB_PATH -Value $dest

      - name: Run E2E tests
        working-directory: apps/desktop/e2e
        env:
          SUPABASE_URL: http://127.0.0.1:54321
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase-keys.outputs.service_role }}
        # Windows não precisa xvfb (rende nativo via Desktop session do runner).
        run: pnpm e2e

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots-${{ github.run_id }}
          path: apps/desktop/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 7  # screenshots são pra debug imediato; 90d default é desperdício

  # Agregador: é ESTE job que a branch protection exige como required check.
  # Como ele sempre roda (if: always()) e enxerga o resultado dos demais,
  # ele cobre tanto o caso "tudo verde" quanto "e2e pulado de propósito"
  # sem deixar PRs presos em "Expected — Waiting for status".
  ci_passed:
    name: CI passed
    needs: [test, e2e]
    if: always()
    runs-on: [self-hosted, macOS, ARM64, leviticus]
    steps:
      - name: Aggregate upstream results
        env:
          TEST_RESULT: ${{ needs.test.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          echo "test: $TEST_RESULT"
          echo "e2e:  $E2E_RESULT"
          # test SEMPRE precisa ter passado
          if [ "$TEST_RESULT" != "success" ]; then
            echo "::error::Typecheck + tests não passou ($TEST_RESULT)"
            exit 1
          fi
          # e2e pode ser success (rodou e passou) ou skipped (landing-only).
          # Qualquer outro estado (failure, cancelled) bloqueia.
          if [ "$E2E_RESULT" != "success" ] && [ "$E2E_RESULT" != "skipped" ]; then
            echo "::error::E2E não está num estado aceitável ($E2E_RESULT)"
            exit 1
          fi
          echo "CI passed ✅"
