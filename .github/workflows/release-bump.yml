name: Release Bump

# Bump de versão automatizado. Dispara via botão "Run workflow" no
# GH Actions (workflow_dispatch).
#
# O que faz:
#   1. Roda `pnpm release ${bump} --ci` no apps/desktop. Isso bumpa
#      package.json + Cargo.toml, atualiza CHANGELOG.md, commita
#      `chore(release): vX.Y.Z` e cria + pusha a tag vX.Y.Z.
#   2. Dispara explicitamente o workflow `Release` pra essa tag.
#      Necessário porque pushes feitos pelo GITHUB_TOKEN do runner
#      NÃO disparam outros workflows (regra anti-loop do GitHub).
#
# Trade-off vs auto-on-push: aqui o release é manual (clica botão na UI).
# Pra full auto, criar PAT em Settings → Developer settings → tokens
# (escopo repo) e adicionar como secret RELEASE_PAT — daí dá pra trocar
# o trigger pra `push: branches: [main]`.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Tipo de bump'
        required: true
        default: 'patch'
        type: choice
        options: [patch, minor, major]

# Evita dois bumps concorrentes (raro mas tóxico — daria duas tags).
concurrency:
  group: release-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Bump
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write  # pra `gh workflow run release.yml`
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # release-it precisa ver todas as tags pra inferir last version
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: release-it (bump + tag + push)
        working-directory: apps/desktop
        env:
          BUMP: ${{ inputs.bump }}
        run: pnpm release "$BUMP" --ci

      - name: Compute new tag
        id: tag
        working-directory: apps/desktop
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Nova tag: v${VERSION}"

      - name: Dispatch Release workflow on the new tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: gh workflow run release.yml --ref "$TAG"
