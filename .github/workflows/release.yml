name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @leviticus/core
        run: pnpm --filter @leviticus/core build

      - name: Typecheck (todos os pacotes)
        run: pnpm typecheck

      - name: Tests (todos os pacotes)
        run: pnpm test

      # Build direto via Tauri CLI — abandonamos tauri-action porque ela
      # re-empacota o tar.gz invalidando o .sig do updater, e mesmo passando
      # --bundles app,dmg,updater não preserva os arquivos. Aqui controlamos
      # tudo: build, signing (env vars), criação da release e upload.
      - name: Build Tauri app
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm tauri build --bundles app,dmg,updater

      - name: Create release + upload assets + latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle"
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          TAG="v${VERSION}"

          # Confirma que tudo que precisamos existe antes de criar a release
          DMG="${BUNDLE_DIR}/dmg/Leviticus_${VERSION}_aarch64.dmg"
          TARGZ="${BUNDLE_DIR}/macos/Leviticus.app.tar.gz"
          SIGFILE="${BUNDLE_DIR}/macos/Leviticus.app.tar.gz.sig"
          for f in "$DMG" "$TARGZ" "$SIGFILE"; do
            [ -f "$f" ] || { echo "ERRO: arquivo esperado faltando: $f"; ls -la "$(dirname "$f")"; exit 1; }
          done

          # Renomeia tar.gz pro nome canônico (com versão+arch) usado no manifest
          ASSET_TARGZ="Leviticus_${VERSION}_aarch64.app.tar.gz"
          cp "$TARGZ" "$ASSET_TARGZ"
          cp "$DMG" .

          # Monta latest.json com a signature do .sig real (mesmo build que o tar.gz)
          SIG=$(cat "$SIGFILE")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          URL="https://github.com/JoaoSipauba/leviticus/releases/download/${TAG}/${ASSET_TARGZ}"
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg signature "$SIG" \
            --arg url "$URL" \
            '{version:$version, notes:"Veja o CHANGELOG", pub_date:$pub_date, platforms:{"darwin-aarch64":{signature:$signature, url:$url}}}' \
            > latest.json
          echo "=== latest.json ==="
          cat latest.json

          # Release notes via heredoc num arquivo separado (--notes-file)
          # pra evitar problemas de indentação YAML com markdown multilinha
          cat > release-notes.md <<EOF
          Veja [CHANGELOG.md](https://github.com/JoaoSipauba/leviticus/blob/main/CHANGELOG.md) para detalhes.

          **Instalação (macOS Apple Silicon):**
          1. Baixe \`Leviticus_${VERSION}_aarch64.dmg\` abaixo.
          2. Abra o \`.dmg\` e arraste o **Leviticus** para a pasta **Aplicativos**.
          3. **Antes da primeira execução**, abra o Terminal e rode:
             \`\`\`
             xattr -cr /Applications/Leviticus.app
             \`\`\`
          4. Abra o app pelo Launchpad ou pasta Aplicativos. Clique em **Abrir** se o macOS pedir.

          > A partir da próxima atualização o app se atualiza sozinho — esse passo do Terminal só é necessário na primeira instalação.
          EOF

          gh release create "$TAG" \
            --title "Leviticus ${TAG}" \
            --notes-file release-notes.md \
            "Leviticus_${VERSION}_aarch64.dmg" \
            "${ASSET_TARGZ}" \
            "latest.json"
