name: Release

on:
  push:
    tags:
      - 'v*'
  # Permite disparo via `gh workflow run release.yml --ref vX.Y.Z`
  # — usado pelo workflow Release Bump após criar a tag (porque pushes
  # de tag feitos com GITHUB_TOKEN não disparam outros workflows).
  workflow_dispatch:

permissions:
  contents: write

# Releases NUNCA cancelam outras releases em andamento — abortar um upload
# de bundle no meio deixa estado corrompido no Supabase Storage e quebra
# o auto-updater pra quem já baixou parcialmente. Queue, não cancel.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform_key }}
    # Self-hosted runners (label-based seleção via fromJSON). Rodam nas
    # máquinas próprias do desenvolvedor — zero quota GHA por release.
    # Hosted runners (macos-latest, windows-latest) cobravam 10x e 2x
    # respectivamente vs Linux; em release builds isso somava rápido.
    runs-on: ${{ fromJSON(matrix.runner) }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: '["self-hosted","macOS","ARM64","leviticus"]'
            platform_key: darwin-aarch64
            rust_target: aarch64-apple-darwin
            bundles: app,dmg,updater
          - runner: '["self-hosted","Windows","X64","leviticus"]'
            platform_key: windows-x86_64
            rust_target: x86_64-pc-windows-msvc
            bundles: nsis,updater
    env:
      # sccache acelera builds Rust mesmo em runners diferentes (cache no
      # GitHub Actions cache backend). Em release vale especialmente porque
      # macOS e Windows são caros — cada minuto poupado conta.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

      - name: Cache cargo target
        uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri -> target
          cache-on-failure: true
          # Save sempre em release — é o único momento que vale popular o
          # cache pras plataformas mac/windows que o CI não usa.

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @leviticus/core
        run: pnpm --filter @leviticus/core build

      - name: Typecheck (todos os pacotes)
        run: pnpm typecheck

      - name: Tests (todos os pacotes)
        # Vars Supabase local — src/env.ts faz requireEnv() em import-time.
        env:
          VITE_SUPABASE_URL: http://127.0.0.1:54321
          VITE_SUPABASE_ANON_KEY: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH
        run: pnpm test

      - name: Setup MSVC environment (Windows only)
        # Necessário pra Cargo achar link.exe do MSVC em vez do `link` GNU
        # do Git for Windows que aparece antes no PATH default.
        if: matrix.platform_key == 'windows-x86_64'
        uses: ilammy/msvc-dev-cmd@a102174a2b586eec2ea151a69e6fd14404a8ce7c # v1.13.0

      - name: Tauri build (macOS)
        # bash funciona no macOS. GitHub Actions não permite matrix context
        # no campo `shell` (line: 98), então split em 2 steps com if.
        if: matrix.platform_key == 'darwin-aarch64'
        shell: bash
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      - name: Tauri build (Windows)
        # powershell pra evitar conflito link GNU/link.exe MSVC.
        if: matrix.platform_key == 'windows-x86_64'
        shell: powershell
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        run: pnpm tauri build --bundles ${{ matrix.bundles }}

      - name: Upload assets to Supabase + emit platform manifest
        shell: bash
        env:
          SUPABASE_URL: https://ttoefyaybhfpwnkbuvzc.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          # PLATFORM inline aqui em vez de env: — Git Bash em Windows às vezes
          # não herda env vars do step quando shell: bash é usado em
          # self-hosted runner não-LocalSystem.
          PLATFORM="${{ matrix.platform_key }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle"
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          TAG="v${VERSION}"
          BUCKET="app-releases"

          # Por plataforma: caminho local do installer/updater + nome remoto.
          if [ "$PLATFORM" = "darwin-aarch64" ]; then
            INSTALLER="${BUNDLE_DIR}/dmg/Leviticus_${VERSION}_aarch64.dmg"
            INSTALLER_NAME="Leviticus_${VERSION}_aarch64.dmg"
            UPDATER="${BUNDLE_DIR}/macos/Leviticus.app.tar.gz"
            UPDATER_SIG="${BUNDLE_DIR}/macos/Leviticus.app.tar.gz.sig"
            UPDATER_NAME="Leviticus_${VERSION}_aarch64.app.tar.gz"
          elif [ "$PLATFORM" = "windows-x86_64" ]; then
            # Tauri 2 NSIS: o updater bundle É o próprio .exe (com .exe.sig)
            INSTALLER="${BUNDLE_DIR}/nsis/Leviticus_${VERSION}_x64-setup.exe"
            INSTALLER_NAME="Leviticus_${VERSION}_x64-setup.exe"
            UPDATER="$INSTALLER"
            UPDATER_SIG="${BUNDLE_DIR}/nsis/Leviticus_${VERSION}_x64-setup.exe.sig"
            UPDATER_NAME="$INSTALLER_NAME"
          else
            echo "Plataforma desconhecida: $PLATFORM"; exit 1
          fi

          # Sanidade: lista o que tem e falha cedo se faltar algum
          for f in "$INSTALLER" "$UPDATER" "$UPDATER_SIG"; do
            if [ ! -f "$f" ]; then
              echo "ERRO: arquivo esperado faltando: $f"
              find "$BUNDLE_DIR" -type f -maxdepth 3 2>/dev/null || true
              exit 1
            fi
          done

          upload() {
            local FILE="$1"
            local DEST="$2"
            echo "Subindo $FILE → $BUCKET/$DEST ($(wc -c < "$FILE") bytes)"
            HTTP=$(curl -sS -o /tmp/sb_response.txt -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: application/octet-stream" \
              -H "x-upsert: true" \
              -T "$FILE" \
              "$SUPABASE_URL/storage/v1/object/$BUCKET/$DEST")
            if [ "$HTTP" -ge 300 ]; then
              echo "ERRO upload (HTTP $HTTP):"
              cat /tmp/sb_response.txt
              echo
              exit 1
            fi
            echo "OK"
          }

          # Sobe installer + updater bundle versionados (no Windows os dois
          # são o mesmo arquivo, então só sobe uma vez)
          upload "$INSTALLER" "${TAG}/${INSTALLER_NAME}"
          if [ "$UPDATER" != "$INSTALLER" ]; then
            upload "$UPDATER" "${TAG}/${UPDATER_NAME}"
          fi

          # Manifest parcial só dessa plataforma. O job de publish baixa, mescla e
          # gera o latest.json final com todas as plataformas presentes.
          # Usa node (sempre presente no runner) em vez de jq — o runner
          # self-hosted Windows não tem jq instalado.
          SIG=$(cat "$UPDATER_SIG")
          URL="${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${TAG}/${UPDATER_NAME}"
          node -e 'const fs=require("fs");const[p,s,u]=process.argv.slice(1);fs.writeFileSync(`platform-${p}.json`,JSON.stringify({signature:s,url:u}))' \
            "$PLATFORM" "$SIG" "$URL"
          upload "platform-${PLATFORM}.json" "${TAG}/platforms/${PLATFORM}.json"

  publish:
    name: Publish latest.json
    needs: build
    # Roda no Mac self-hosted (tem bash/curl/jq/node + gh CLI). Job é leve
    # (~30s), só mescla manifests + cria GH Release + sobe latest.json.
    runs-on: [self-hosted, macOS, ARM64, leviticus]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Combine platform manifests and publish latest.json
        env:
          SUPABASE_URL: https://ttoefyaybhfpwnkbuvzc.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          TAG="v${VERSION}"
          BUCKET="app-releases"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          MAC_URL="${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${TAG}/platforms/darwin-aarch64.json"
          WIN_URL="${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${TAG}/platforms/windows-x86_64.json"

          MAC_JSON=$(curl -sSfL "$MAC_URL")
          WIN_JSON=$(curl -sSfL "$WIN_URL")

          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --argjson darwin "$MAC_JSON" \
            --argjson windows "$WIN_JSON" \
            '{version:$version, notes:"Veja o CHANGELOG", pub_date:$pub_date, platforms:{"darwin-aarch64":$darwin, "windows-x86_64":$windows}}' \
            > latest.json

          echo "=== latest.json ==="
          cat latest.json

          # latest.json sempre na raiz, sobrescrito a cada release —
          # endpoint do updater no app aponta sempre pra esse path estável.
          HTTP=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" -X POST \
            -H "Authorization: Bearer $SUPABASE_KEY" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            -T latest.json \
            "$SUPABASE_URL/storage/v1/object/$BUCKET/latest.json")
          if [ "$HTTP" -ge 300 ]; then
            echo "ERRO upload latest.json (HTTP $HTTP):"
            cat /tmp/resp.txt
            exit 1
          fi
          echo "latest.json publicado: ${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/latest.json"

      - name: Create GitHub Release with assets (archive)
        env:
          SUPABASE_URL: https://ttoefyaybhfpwnkbuvzc.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          TAG="v${VERSION}"
          BUCKET="app-releases"
          BASE_URL="${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${TAG}"

          DMG="Leviticus_${VERSION}_aarch64.dmg"
          TARGZ="Leviticus_${VERSION}_aarch64.app.tar.gz"
          EXE="Leviticus_${VERSION}_x64-setup.exe"

          # Baixa os assets do Supabase pro runner. Custo: ~20MB de transferência,
          # ~10s total. Em troca, aba Releases do GitHub mostra histórico completo
          # com binários atrelados a cada tag.
          curl -sSfL -o "$DMG"   "${BASE_URL}/${DMG}"
          curl -sSfL -o "$TARGZ" "${BASE_URL}/${TARGZ}"
          curl -sSfL -o "$EXE"   "${BASE_URL}/${EXE}"

          cat > release-notes.md <<EOF
          Veja [CHANGELOG.md](https://github.com/JoaoSipauba/leviticus/blob/main/CHANGELOG.md) para detalhes.

          ## Downloads

          | Plataforma | Arquivo |
          |---|---|
          | macOS (Apple Silicon) | \`${DMG}\` |
          | Windows x64 | \`${EXE}\` |

          ## Instalação macOS
          1. Baixa o \`.dmg\`, arrasta o Leviticus para Aplicativos.
          2. Antes de abrir pela primeira vez, no Terminal: \`xattr -cr /Applications/Leviticus.app\`
          3. Abre normalmente.

          ## Instalação Windows
          1. Baixa o \`.exe\` e executa.
          2. SmartScreen vai avisar — clica em **"Mais informações"** → **"Executar mesmo assim"**.
          3. Wizard NSIS instala.

          Updates automáticos via Supabase Storage a partir da próxima versão.
          EOF

          gh release create "$TAG" \
            --title "Leviticus ${TAG}" \
            --notes-file release-notes.md \
            "$DMG" "$TARGZ" "$EXE" "latest.json"
