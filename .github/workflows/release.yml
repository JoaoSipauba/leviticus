name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @leviticus/core
        run: pnpm --filter @leviticus/core build

      - name: Typecheck (todos os pacotes)
        run: pnpm typecheck

      - name: Tests (todos os pacotes)
        run: pnpm test

      - name: Build Tauri app and publish release
        # Pinado por SHA (não por tag) porque o tag major @v0 estava desatualizado
        # e o lookup do .sig do updater falha em versões antigas ("Signature not
        # found for the updater JSON. Skipping upload..."). SHA-pin garante que
        # nenhum movimento de tag mude o que roda aqui.
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          includeUpdaterJson: true
          tagName: v__VERSION__
          releaseName: 'Leviticus v__VERSION__'
          # Sem --target: macos-latest é ARM nativo e o output cai em
          # target/release/bundle/macos/ (path que a tauri-action procura
          # ao montar o latest.json). Forçar --target aarch64-apple-darwin
          # quebra a geração do manifest do updater (signature not found).
          releaseBody: |
            Veja [CHANGELOG.md](https://github.com/JoaoSipauba/leviticus/blob/main/CHANGELOG.md) para detalhes.

            **Instalação (macOS Apple Silicon):**
            1. Baixe `Leviticus_X.Y.Z_aarch64.dmg` abaixo.
            2. Abra o `.dmg` e arraste o **Leviticus** para a pasta **Aplicativos**.
            3. **Antes da primeira execução**, abra o Terminal e rode:
               ```
               xattr -cr /Applications/Leviticus.app
               ```
               Esse comando remove a flag de quarentena do macOS (necessário porque o app não é assinado por um Developer ID Apple).
            4. Abra o app pelo Launchpad ou pasta Aplicativos. O macOS pode pedir confirmação na primeira vez — clique em **Abrir**.

            > A partir da próxima atualização o app se atualiza sozinho — esse passo do Terminal só é necessário na primeira instalação.
          releaseDraft: false
          prerelease: false
