name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @leviticus/core
        run: pnpm --filter @leviticus/core build

      - name: Build Tauri app and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          includeUpdaterJson: true
          releaseName: 'Leviticus __VERSION__'
          releaseBody: |
            Veja [CHANGELOG.md](https://github.com/JoaoSipauba/leviticus/blob/main/CHANGELOG.md) para detalhes.

            **Instalação (macOS Apple Silicon):**
            1. Baixe o arquivo `.dmg` abaixo.
            2. Abra o `.dmg` e arraste o app para a pasta Aplicativos.
            3. Na primeira execução, o macOS vai exibir "desenvolvedor não identificado" — clique com o botão direito no app e escolha **Abrir**.
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
