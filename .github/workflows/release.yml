name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable @ 2026-05
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo target
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build @leviticus/core
        run: pnpm --filter @leviticus/core build

      - name: Typecheck (todos os pacotes)
        run: pnpm typecheck

      - name: Tests (todos os pacotes)
        run: pnpm test

      # Build direto via Tauri CLI — abandonamos tauri-action porque ela
      # re-empacota o tar.gz invalidando o .sig do updater, e mesmo passando
      # --bundles app,dmg,updater não preserva os arquivos. Aqui controlamos
      # tudo: build, signing (env vars), criação da release e upload.
      - name: Build Tauri app
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: pnpm tauri build --bundles app,dmg,updater

      - name: Upload assets to Supabase Storage + latest.json
        env:
          SUPABASE_URL: https://ttoefyaybhfpwnkbuvzc.supabase.co
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle"
          VERSION=$(node -p "require('./apps/desktop/package.json').version")
          TAG="v${VERSION}"
          BUCKET="app-releases"

          # Confirma que tudo que precisamos existe antes de subir
          DMG="${BUNDLE_DIR}/dmg/Leviticus_${VERSION}_aarch64.dmg"
          TARGZ="${BUNDLE_DIR}/macos/Leviticus.app.tar.gz"
          SIGFILE="${BUNDLE_DIR}/macos/Leviticus.app.tar.gz.sig"
          for f in "$DMG" "$TARGZ" "$SIGFILE"; do
            [ -f "$f" ] || { echo "ERRO: arquivo esperado faltando: $f"; ls -la "$(dirname "$f")"; exit 1; }
          done

          ASSET_TARGZ="Leviticus_${VERSION}_aarch64.app.tar.gz"
          ASSET_DMG="Leviticus_${VERSION}_aarch64.dmg"
          cp "$TARGZ" "$ASSET_TARGZ"
          cp "$DMG" "./$ASSET_DMG"

          # Helper: upload file pro bucket no path indicado (x-upsert=true permite
          # sobrescrever; latest.json é sempre sobrescrito a cada release).
          upload() {
            local FILE="$1"
            local DEST_PATH="$2"
            local MIME="$3"
            echo "Subindo $FILE → $BUCKET/$DEST_PATH"
            curl -sS -fL -X POST \
              -H "Authorization: Bearer $SUPABASE_KEY" \
              -H "Content-Type: $MIME" \
              -H "x-upsert: true" \
              --data-binary "@$FILE" \
              "$SUPABASE_URL/storage/v1/object/$BUCKET/$DEST_PATH"
            echo
          }

          # Sobe binários versionados (preserva histórico de instaladores)
          upload "$ASSET_TARGZ" "${TAG}/${ASSET_TARGZ}" "application/gzip"
          upload "$ASSET_DMG"   "${TAG}/${ASSET_DMG}"   "application/x-apple-diskimage"

          # Monta latest.json apontando pro tar.gz versionado recém-subido
          SIG=$(cat "$SIGFILE")
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          TARGZ_URL="${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${TAG}/${ASSET_TARGZ}"
          jq -n \
            --arg version "$VERSION" \
            --arg pub_date "$PUB_DATE" \
            --arg signature "$SIG" \
            --arg url "$TARGZ_URL" \
            '{version:$version, notes:"Veja o CHANGELOG", pub_date:$pub_date, platforms:{"darwin-aarch64":{signature:$signature, url:$url}}}' \
            > latest.json
          echo "=== latest.json ==="
          cat latest.json

          # latest.json fica na raiz do bucket, sobrescrito a cada release —
          # endpoint do updater no app aponta sempre pra esse path estável.
          upload "latest.json" "latest.json" "application/json"

          # Também cria GitHub Release pra arquivo + visibilidade interna —
          # usuários externos baixam do Supabase (repo é privado).
          cat > release-notes.md <<EOF
          Veja [CHANGELOG.md](https://github.com/JoaoSipauba/leviticus/blob/main/CHANGELOG.md) para detalhes.

          **Download direto:** ${SUPABASE_URL}/storage/v1/object/public/${BUCKET}/${TAG}/${ASSET_DMG}

          A partir desta versão o app se atualiza sozinho via Supabase Storage.
          EOF

          gh release create "$TAG" \
            --title "Leviticus ${TAG}" \
            --notes-file release-notes.md \
            "$ASSET_DMG" \
            "$ASSET_TARGZ" \
            "latest.json"
