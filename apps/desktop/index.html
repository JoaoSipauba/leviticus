<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leviticus</title>
    <style>
      /* Boot splash: pintado já no HTML pra cobrir o gap entre a janela
         do Tauri abrir e o bundle React montar. React dispara o evento
         'leviticus-ready' quando termina o auth (incluindo timeout
         offline) — só então o splash some. */
      html, body { margin: 0; padding: 0; height: 100%; background: #0a0a13; }
      #boot-splash {
        position: fixed;
        inset: 0;
        background: #0a0a13;
        color: #e5e7eb;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.25s ease-out;
      }
      #boot-splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #boot-title {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: #f3f4f6;
      }
      #boot-spinner {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2.5px solid rgba(255, 255, 255, 0.08);
        border-top-color: #6366f1;
        animation: boot-spin 0.9s linear infinite;
      }
      @keyframes boot-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="boot-splash" role="status" aria-live="polite">
      <div id="boot-title">Leviticus</div>
      <div id="boot-spinner" aria-label="Carregando"></div>
    </div>
    <div id="root"></div>
    <script>
      // Idempotente — React chama isso quando auth termina. Após o fade
      // o splash é removido do DOM pra liberar o z-index.
      window.addEventListener('leviticus-ready', function once() {
        var el = document.getElementById('boot-splash')
        if (!el) return
        el.classList.add('hide')
        setTimeout(function () { el.remove() }, 260)
      })
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
