<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leviticus</title>
    <style>
      /* Boot splash: pintado já no HTML pra cobrir o gap entre a janela
         do Tauri abrir e o bundle React montar. Equalizer animado em
         CSS puro (sem imagem) — mesma identidade do ícone do app, sem
         depender de fetch de asset. React dispara 'leviticus-ready'
         quando termina o auth — só então o splash some. */
      html, body { margin: 0; padding: 0; height: 100%; background: #0a0a13; }

      #boot-splash {
        position: fixed;
        inset: 0;
        background: #0a0a13;
        color: #f3f4f6;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 26px;
        z-index: 9999;
        opacity: 1;
        transition: opacity 0.25s ease-out;
      }
      #boot-splash.hide {
        opacity: 0;
        pointer-events: none;
      }

      /* Equalizer: 5 barras + linha base. Proporções medidas pixel a
         pixel do ícone do app (icons/Square310x310Logo.png): alturas
         relativas 100/36/68/68/36, barras largas, 1º vão maior que os
         demais, baseline ~6% mais larga que o grupo de barras. */
      #boot-eq-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      #boot-eq {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 6px;
        height: 72px;
      }
      #boot-eq > span {
        display: block;
        width: 14px;
        background: linear-gradient(180deg, #60a5fa, #3b82f6);
        border-radius: 3px;
        transform-origin: bottom center;
        animation: boot-eq 1.1s ease-in-out infinite;
      }
      #boot-eq > span:nth-child(1) { height: 100%; animation-delay: 0s; }
      #boot-eq > span:nth-child(2) { height: 36%; margin-left: 4px; animation-delay: -0.4s; }
      #boot-eq > span:nth-child(3) { height: 68%; animation-delay: -0.7s; }
      #boot-eq > span:nth-child(4) { height: 68%; animation-delay: -0.2s; }
      #boot-eq > span:nth-child(5) { height: 36%; animation-delay: -0.55s; }
      #boot-baseline {
        width: 105px;
        height: 4px;
        background: #3b82f6;
        border-radius: 2px;
      }

      #boot-title {
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.015em;
      }

      /* Estado de atualização: revelado só quando o boot detecta um
         update (evento 'leviticus-updating'). No boot normal fica oculto
         e o splash é idêntico ao de sempre. */
      #boot-status {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        min-height: 44px;
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      #boot-status.show { opacity: 1; }
      #boot-status-text {
        font-size: 14px;
        font-weight: 500;
        color: #9ca3af;
        letter-spacing: 0.01em;
      }
      #boot-status-version {
        font-size: 12px;
        color: #4b5563;
      }

      /* Pulse suave: as barras respiram sem perder a silhueta da logo. */
      @keyframes boot-eq {
        0%, 100% { transform: scaleY(0.86); }
        50%      { transform: scaleY(1); }
      }
    </style>
  </head>

  <body>
    <div id="boot-splash" role="status" aria-live="polite" aria-label="Carregando">
      <div id="boot-eq-wrap" aria-hidden="true">
        <div id="boot-eq">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <div id="boot-baseline"></div>
      </div>
      <div id="boot-title">Leviticus</div>
      <div id="boot-status">
        <div id="boot-status-text">Instalando atualização</div>
        <div id="boot-status-version"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Idempotente — React chama isso quando auth termina. Após o fade
      // o splash é removido do DOM pra liberar o z-index.
      window.addEventListener('leviticus-ready', function once() {
        var el = document.getElementById('boot-splash');
        if (!el) return;
        el.classList.add('hide');
        setTimeout(function () { el.remove(); }, 260);
      });

      // React dispara isso quando o check de boot encontra um update.
      // Revela o estado "Instalando atualização" no splash — que segue
      // visível até o app reiniciar na versão nova.
      window.addEventListener('leviticus-updating', function (e) {
        var status = document.getElementById('boot-status');
        if (!status) return;
        var version = e && e.detail && e.detail.version;
        if (version) {
          document.getElementById('boot-status-version').textContent =
            'versão ' + version;
        }
        status.classList.add('show');
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
