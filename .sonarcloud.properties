sonar.projectKey=JoaoSipauba_leviticus
sonar.organization=joaosipauba

# Marcar test files como TEST code (não SOURCE) — Sonar aplica rule sets
# diferentes e mais lenientes pra testes, evitando false positives de
# Reliability/Maintainability em padrões legítimos de teste (mocks any,
# arrow functions no-op, factories, etc.).
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/e2e/specs/**,**/e2e/helpers/**

# Test files são naturalmente repetitivos no setup (mocks, beforeEach,
# pattern de assertion). Repetição em test setup ajuda legibilidade —
# DRY agressivo em testes torna falhas mais difíceis de diagnosticar.
sonar.cpd.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/e2e/specs/**

# Excluir test files também da análise de coverage rule (não é o foco).
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/e2e/**

# Excluir build/generated/migration outputs.
sonar.exclusions=**/node_modules/**,**/dist/**,**/.next/**,**/target/**,**/supabase/migrations/**,**/apps/desktop/src-tauri/migrations/**
